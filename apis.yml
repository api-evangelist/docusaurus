aid: docusaurus
name: Docusaurus
description: >-
  Docusaurus is an open-source static site generator built by Meta for creating
  documentation websites. Powered by React, it supports MDX, versioning,
  internationalization, search, and a plugin ecosystem, making it a popular
  choice for open-source project documentation and developer portals.
