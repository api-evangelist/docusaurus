aid: docusaurus
name: Docusaurus
description: >-
  Docusaurus is an open-source static site generator built by Meta for
  creating documentation websites. It is powered by React and supports
  MDX, versioning, internationalization, search, and plugins, making it
  a popular choice for open-source project documentation and developer portals.
